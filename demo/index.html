<!doctype html>
<html>
  <head>
    <title>OpenSCD Shell Demo</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&family=Roboto:wght@300;400;500&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./colors.css" />
    <link rel="stylesheet" href="./theming.css" />
  </head>
  <body>
    <oscd-shell locale="de"> </oscd-shell>
    <script type="module">
      // Known issue, scoped registry polyfill doesn't load as fast as oscd-shell, causing oscs-shell to fail.
      // To safeguard, we await the polyfill first, then load the rest.
      await import('@webcomponents/scoped-custom-element-registry');
      await import('../dist/oscd-shell.js');
      await import('./index.js');

      const _customElementsDefine = window.customElements.define;
      window.customElements.define = (name, cl, conf) => {
        if (!customElements.get(name)) {
          try {
            _customElementsDefine.call(window.customElements, name, cl, conf);
          } catch (e) {
            console.warn(e);
          }
        }
      };
    </script>
  </body>
</html>
